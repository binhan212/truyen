<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thư Viện Tiên Đạo - Đọc truyện tiên hiệp, huyền huyễn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/homepage.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <style>
    .header-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
    .hdr-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:10px;background:none;border:1px solid var(--border-subtle);color:var(--text-secondary);cursor:pointer;text-decoration:none;position:relative;transition:all var(--transition-smooth);}
    .hdr-btn:hover{border-color:var(--border-glow);color:var(--gold);background:rgba(201,160,80,0.06);}
    .hdr-btn .badge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;border-radius:99px;background:var(--danger,#e85353);color:#fff;font-size:0.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;}
    .user-dropdown{position:relative;}
    .user-btn{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 6px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border-subtle);color:var(--text-primary);cursor:pointer;font-family:inherit;font-size:0.82rem;transition:all var(--transition-smooth);white-space:nowrap;}
    .user-btn:hover{border-color:var(--border-glow);color:var(--gold);}
    .user-btn .avatar-dot{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#0a0a0f;font-family:"Playfair Display",serif;font-weight:700;font-size:0.75rem;}
    .dropdown-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:180px;background:var(--bg-panel);border:1px solid var(--border-subtle);border-radius:12px;padding:6px;box-shadow:0 8px 32px rgba(0,0,0,0.5);opacity:0;pointer-events:none;transform:translateY(-6px);transition:all 0.2s;z-index:200;}
    .dropdown-menu.show{opacity:1;pointer-events:auto;transform:translateY(0);}
    .dropdown-item{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border-radius:8px;background:none;border:none;color:var(--text-primary);font-family:inherit;font-size:0.84rem;cursor:pointer;text-decoration:none;transition:all var(--transition-smooth);}
    .dropdown-item:hover{background:rgba(201,160,80,0.06);color:var(--gold);}
    .dropdown-divider{height:1px;background:var(--border-subtle);margin:4px 0;}
    .dropdown-item.danger{color:#e85353;}
    .dropdown-item.danger:hover{background:rgba(232,83,83,0.08);}
    .auth-links{display:flex;gap:8px;}
    .auth-link{padding:7px 16px;border-radius:8px;font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all var(--transition-smooth);}
    .auth-link.login{background:none;border:1px solid var(--border-subtle);color:var(--text-primary);}
    .auth-link.login:hover{border-color:var(--border-glow);color:var(--gold);}
    .auth-link.register{background:var(--gold);border:none;color:#0a0a0f;}
    .auth-link.register:hover{background:var(--gold-light);box-shadow:0 0 12px var(--accent-glow);}
    @media(max-width:640px){.hdr-btn{width:34px;height:34px;}.user-btn{font-size:0.75rem;padding:5px 10px 5px 5px;}.user-btn .avatar-dot{width:24px;height:24px;}.auth-link{padding:6px 12px;font-size:0.72rem;}}
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="site-logo">
        <iconify-icon icon="heroicons:book-open-20-solid" width="22" height="22"></iconify-icon>
        Thư Viện Tiên Đạo
      </a>
      <div class="search-box" id="searchBox">
        <iconify-icon icon="heroicons:magnifying-glass-20-solid" width="18" height="18"></iconify-icon>
        <input type="text" id="searchInput" placeholder="Tìm truyện, tác giả...">
      </div>
      <div class="header-actions" id="headerActions"></div>
    </div>
    <nav class="nav-pills">
      <button class="nav-pill active" data-link="list.html?cat=all">Tất cả</button>
      <button class="nav-pill" data-link="list.html?cat=all">Tiên hiệp</button>
      <button class="nav-pill" data-link="list.html?cat=all">Huyền huyễn</button>
      <button class="nav-pill" data-link="list.html?cat=all">Kiếm hiệp</button>
      <button class="nav-pill" data-link="rankings.html">BXH</button>
      <button class="nav-pill" data-link="genres.html">Thể loại</button>
      <button class="nav-pill" data-link="list.html?cat=newposted">Mới đăng</button>
      <button class="nav-pill" data-link="list.html?cat=completed">Hoàn thành</button>
    </nav>
  </div>
</header>

<div class="container">

  <!-- ── Hero Slider ── -->
  <div class="slider-wrap" id="sliderWrap">
    <div class="slider-track" id="sliderTrack"></div>
    <button class="slider-btn prev" id="btnPrevSlide">
      <iconify-icon icon="heroicons:chevron-left-20-solid" width="22" height="22"></iconify-icon>
    </button>
    <button class="slider-btn next" id="btnNextSlide">
      <iconify-icon icon="heroicons:chevron-right-20-solid" width="22" height="22"></iconify-icon>
    </button>
    <div class="slider-dots" id="sliderDots"></div>
  </div>

  <!-- ── Đề Cử ── -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">
        <iconify-icon icon="heroicons:fire-20-solid" width="20" height="20" style="color:var(--accent)"></iconify-icon>
        Đề Cử
      </h2>
      <a href="list.html?cat=recommend" class="section-link">Xem thêm <iconify-icon icon="heroicons:chevron-right-20-solid" width="16" height="16"></iconify-icon></a>
    </div>
    <div class="card-row" id="sec-recommend"></div>
  </section>

  <!-- ── Mới Nhất ── -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">
        <iconify-icon icon="heroicons:clock-20-solid" width="20" height="20" style="color:var(--accent)"></iconify-icon>
        Mới Cập Nhật
      </h2>
      <a href="list.html?cat=latest" class="section-link">Xem thêm <iconify-icon icon="heroicons:chevron-right-20-solid" width="16" height="16"></iconify-icon></a>
    </div>
    <div class="card-row" id="sec-latest"></div>
  </section>

  <!-- ── Bảng Xếp Hạng + Đọc Nhiều ── -->
  <section class="section">
    <div class="rankings-wrap">
      <div class="rank-panel">
        <div class="rank-panel-title">
          <iconify-icon icon="heroicons:chart-bar-20-solid" width="18" height="18"></iconify-icon>
          Bảng Xếp Hạng
        </div>
        <div class="rank-list" id="rank-popular"></div>
      </div>
      <div class="rank-panel">
        <div class="rank-panel-title">
          <iconify-icon icon="heroicons:arrow-trending-up-20-solid" width="18" height="18"></iconify-icon>
          Đề Cử Nhiều
        </div>
        <div class="rank-list" id="rank-recommend"></div>
      </div>
    </div>
  </section>

  <!-- ── Đọc Nhiều ── -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">
        <iconify-icon icon="heroicons:eye-20-solid" width="20" height="20" style="color:var(--accent)"></iconify-icon>
        Đọc Nhiều Nhất
      </h2>
      <a href="list.html?cat=mostread" class="section-link">Xem thêm <iconify-icon icon="heroicons:chevron-right-20-solid" width="16" height="16"></iconify-icon></a>
    </div>
    <div class="card-row" id="sec-mostread"></div>
  </section>

  <!-- ── Mới Đăng ── -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">
        <iconify-icon icon="heroicons:sparkles-20-solid" width="20" height="20" style="color:var(--accent)"></iconify-icon>
        Mới Đăng
      </h2>
      <a href="list.html?cat=newposted" class="section-link">Xem thêm <iconify-icon icon="heroicons:chevron-right-20-solid" width="16" height="16"></iconify-icon></a>
    </div>
    <div class="card-row" id="sec-newposted"></div>
  </section>

  <!-- ── Hoàn Thành ── -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">
        <iconify-icon icon="heroicons:check-badge-20-solid" width="20" height="20" style="color:var(--accent)"></iconify-icon>
        Mới Hoàn Thành
      </h2>
      <a href="list.html?cat=completed" class="section-link">Xem thêm <iconify-icon icon="heroicons:chevron-right-20-solid" width="16" height="16"></iconify-icon></a>
    </div>
    <div class="card-row" id="sec-completed"></div>
  </section>

</div>

<!-- ── Footer ── -->
<footer class="site-footer">
  &copy; 2024 Thư Viện Tiên Đạo &mdash; Đọc truyện online miễn phí
</footer>

<script src="assets/js/auth.js"></script>
<script src="assets/js/homepage.js"></script>
<script>
(function(){
  var searchInput=document.getElementById("searchInput");
  var searchBox=document.getElementById("searchBox");
  if(searchBox){searchBox.addEventListener("click",function(){window.location.href="search.html";});}
  if(searchInput){
    searchInput.addEventListener("keydown",function(e){if(e.key==="Enter"){var q=encodeURIComponent(this.value.trim());window.location.href="search.html"+(q?"?q="+q:"");}});
    searchInput.addEventListener("click",function(e){e.stopPropagation();});
  }

  document.querySelectorAll(".nav-pill[data-link]").forEach(function(b){
    b.addEventListener("click",function(){window.location.href=this.dataset.link;});
  });

  function renderHeaderActions(){
    var el=document.getElementById("headerActions");
    if(!el)return;
    var user=TienAuth.getUser();
    if(user){
      el.innerHTML=
        '<a href="notifications.html" class="hdr-btn" title="Thông báo"><iconify-icon icon="heroicons:bell-20-solid" width="18" height="18"></iconify-icon><span class="badge">5</span></a>'+
        '<a href="library.html" class="hdr-btn" title="Tủ sách"><iconify-icon icon="heroicons:bookmark-20-solid" width="18" height="18"></iconify-icon></a>'+
        '<div class="user-dropdown" id="userDropdown">'+
          '<button class="user-btn" id="userBtn"><span class="avatar-dot">'+user.avatar+'</span> '+user.username+' <iconify-icon icon="heroicons:chevron-down-20-solid" width="14" height="14"></iconify-icon></button>'+
          '<div class="dropdown-menu" id="dropdownMenu">'+
            '<a class="dropdown-item" href="library.html"><iconify-icon icon="heroicons:bookmark-20-solid" width="16" height="16"></iconify-icon> Tủ sách của tôi</a>'+
            '<a class="dropdown-item" href="notifications.html"><iconify-icon icon="heroicons:bell-20-solid" width="16" height="16"></iconify-icon> Thông báo</a>'+
            '<div class="dropdown-divider"></div>'+
            '<button class="dropdown-item danger" id="btnLogout"><iconify-icon icon="heroicons:arrow-right-start-on-rectangle-20-solid" width="16" height="16"></iconify-icon> Đăng xuất</button>'+
          '</div>'+
        '</div>';
      var uBtn=document.getElementById("userBtn");
      var dMenu=document.getElementById("dropdownMenu");
      if(uBtn){uBtn.addEventListener("click",function(e){e.stopPropagation();dMenu.classList.toggle("show");});}
      document.addEventListener("click",function(){if(dMenu)dMenu.classList.remove("show");});
      var logoutBtn=document.getElementById("btnLogout");
      if(logoutBtn){logoutBtn.addEventListener("click",function(){TienAuth.logout();window.location.reload();});}
    }else{
      el.innerHTML=
        '<a href="login.html" class="auth-link login">Đăng nhập</a>'+
        '<a href="register.html" class="auth-link register">Đăng ký</a>';
    }
  }
  renderHeaderActions();
})();
</script>
</body>
</html>
