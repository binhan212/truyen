<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tìm kiếm - Thư Viện Tiên Đạo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/list.css">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <style>
    .search-hero {
      padding: 20px 0 12px;
    }
    .search-box-lg {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg-panel);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 14px 20px;
      transition: border-color 0.3s;
    }
    .search-box-lg:focus-within {
      border-color: var(--border-glow);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .search-box-lg iconify-icon { color: var(--text-secondary); flex-shrink: 0; }
    .search-box-lg input {
      background: none; border: none; outline: none;
      color: var(--text-primary); font-family: inherit;
      font-size: 1rem; width: 100%;
    }
    .search-box-lg input::placeholder { color: var(--text-secondary); }
    .btn-search {
      padding: 8px 20px; border-radius: 8px;
      background: var(--gold); border: none;
      color: #0a0a0f; font-family: inherit; font-weight: 700;
      font-size: 0.85rem; cursor: pointer;
      transition: all var(--transition-smooth); flex-shrink: 0;
    }
    .btn-search:hover { background: var(--gold-light); box-shadow: 0 0 16px var(--accent-glow); }
    .quick-tags {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 12px 0 4px;
    }
    .quick-tag {
      padding: 5px 14px; border-radius: 99px;
      border: 1px solid var(--border-subtle);
      background: none; color: var(--text-secondary);
      font-family: inherit; font-size: 0.78rem; cursor: pointer;
      transition: all var(--transition-smooth);
    }
    .quick-tag:hover, .quick-tag.active {
      border-color: var(--border-glow); color: var(--gold-light);
      background: rgba(201,160,80,0.08);
    }
    .search-stats { font-size: 0.82rem; color: var(--text-secondary); padding: 4px 0 8px; }
    .search-stats strong { color: var(--gold-light); }
    .highlight { color: var(--gold-light); font-weight: 600; }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="container">
    <div class="top-inner">
      <a href="index.html" class="back-link">
        <iconify-icon icon="heroicons:chevron-left-20-solid" width="16" height="16"></iconify-icon>
        Thư viện
      </a>
      <h1 class="page-title">Tìm kiếm</h1>
      <span class="result-count" id="resultCount"></span>
    </div>
  </div>
</div>

<div class="container">

  <!-- ── Search Hero ── -->
  <div class="search-hero">
    <div class="search-box-lg">
      <iconify-icon icon="heroicons:magnifying-glass-20-solid" width="22" height="22"></iconify-icon>
      <input type="text" id="searchInput" placeholder="Nhập tên truyện, tác giả..." autofocus>
      <button class="btn-search" id="btnSearch">Tìm</button>
    </div>
    <div class="quick-tags" id="quickTags">
      <span style="font-size:0.78rem;color:var(--text-secondary);margin-right:4px;padding:5px 0;">Gợi ý:</span>
      <button class="quick-tag" data-tag="Tiên hiệp">Tiên hiệp</button>
      <button class="quick-tag" data-tag="Huyền huyễn">Huyền huyễn</button>
      <button class="quick-tag" data-tag="Hệ thống">Hệ thống</button>
      <button class="quick-tag" data-tag="Tu luyện">Tu luyện</button>
      <button class="quick-tag" data-tag="Kiếm đạo">Kiếm đạo</button>
      <button class="quick-tag" data-tag="Trùng sinh">Trùng sinh</button>
      <button class="quick-tag" data-tag="Thạch Trư">Thạch Trư</button>
      <button class="quick-tag" data-tag="Nhĩ Căn">Nhĩ Căn</button>
    </div>
    <div class="search-stats" id="searchStats" style="display:none;">
      Tìm thấy <strong id="matchCount">0</strong> kết quả cho "<span class="highlight" id="matchQuery"></span>"
    </div>
  </div>

  <div class="page-layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">
          <iconify-icon icon="heroicons:tag-20-solid" width="15" height="15"></iconify-icon>
          Danh mục
        </div>
        <div class="sidebar-list" id="catList">
          <button class="sidebar-item active" data-cat="all">Tất cả <span class="count" id="cntAll"></span></button>
          <button class="sidebar-item" data-cat="recommend">Đề cử <span class="count">24</span></button>
          <button class="sidebar-item" data-cat="latest">Mới nhất <span class="count">24</span></button>
          <button class="sidebar-item" data-cat="mostread">Đọc nhiều <span class="count">24</span></button>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">
          <iconify-icon icon="heroicons:bars-arrow-down-20-solid" width="15" height="15"></iconify-icon>
          Sắp xếp
        </div>
        <div class="sidebar-list" id="sortList">
          <button class="sidebar-item active" data-sort="default">Mặc định</button>
          <button class="sidebar-item" data-sort="rating">Đánh giá cao</button>
          <button class="sidebar-item" data-sort="views">Lượt đọc</button>
          <button class="sidebar-item" data-sort="chapters">Số chương</button>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">
          <iconify-icon icon="heroicons:funnel-20-solid" width="15" height="15"></iconify-icon>
          Trạng thái
        </div>
        <div class="sidebar-list" id="statusList">
          <button class="sidebar-item active" data-status="all">Tất cả</button>
          <button class="sidebar-item" data-status="ongoing">Đang ra</button>
          <button class="sidebar-item" data-status="completed">Hoàn thành</button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="info-bar">
        <span id="pageInfo"></span>
      </div>
      <div class="card-list" id="cardList">
        <div class="empty-state">
          <iconify-icon icon="heroicons:magnifying-glass-20-solid" width="48" height="48"></iconify-icon>
          <p>Nhập từ khóa để tìm kiếm truyện</p>
        </div>
      </div>
      <div class="pagination-wrap" id="pagination"></div>
    </main>
  </div>

</div>

<footer class="site-footer">
  &copy; 2024 Thư Viện Tiên Đạo &mdash; Đọc truyện online miễn phí
</footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/search.js"></script>
</body>
</html>
