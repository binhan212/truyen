<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - Thư Viện Tiên Đạo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <style>
    :root{--bg-deep:#08080f;--bg-panel:#0f0f1a;--bg-card:#151528;--gold:#c9a050;--gold-light:#e0c87c;--gold-dim:#8a6d3b;--text-primary:#d8d4c8;--text-secondary:#8a8780;--text-title:#e8dcc8;--accent-glow:rgba(201,160,80,0.25);--border-subtle:rgba(201,160,80,0.12);--border-glow:rgba(201,160,80,0.4);--shadow-gold:0 0 20px rgba(201,160,80,0.12);--transition-smooth:0.3s cubic-bezier(0.4,0,0.2,1);--danger:#e85353;--success:#4ade80;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg-deep);color:var(--text-primary);font-family:"Lora","Georgia","Times New Roman",serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
    body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(201,160,80,0.06) 0%,transparent 55%),radial-gradient(ellipse at 30% 100%,rgba(160,90,40,0.04) 0%,transparent 50%);}
    .auth-wrap{position:relative;z-index:1;width:100%;max-width:460px;padding:24px;}
    .back-home{display:inline-flex;align-items:center;gap:4px;text-decoration:none;color:var(--text-secondary);font-size:0.85rem;margin-bottom:20px;transition:color var(--transition-smooth);}
    .back-home:hover{color:var(--gold);}
    .auth-card{background:var(--bg-panel);border:1px solid var(--border-subtle);border-radius:16px;padding:40px 36px;box-shadow:0 0 60px rgba(0,0,0,0.5),var(--shadow-gold);}
    .auth-logo{text-align:center;margin-bottom:24px;}
    .auth-logo iconify-icon{color:var(--gold);margin-bottom:8px;}
    .auth-logo h2{font-family:"Playfair Display","Lora",serif;font-size:1.5rem;font-weight:800;color:var(--gold);text-shadow:0 0 12px var(--accent-glow);}
    .auth-logo p{font-size:0.82rem;color:var(--text-secondary);margin-top:4px;}
    .form-group{margin-bottom:16px;}
    .form-group label{display:block;font-size:0.8rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;}
    .input-wrap{display:flex;align-items:center;gap:10px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:10px;padding:12px 14px;transition:border-color var(--transition-smooth);}
    .input-wrap:focus-within{border-color:var(--border-glow);box-shadow:0 0 12px var(--accent-glow);}
    .input-wrap iconify-icon{color:var(--text-secondary);flex-shrink:0;}
    .input-wrap input{background:none;border:none;outline:none;color:var(--text-primary);font-family:inherit;font-size:0.9rem;width:100%;}
    .input-wrap input::placeholder{color:var(--text-secondary);opacity:0.6;}
    .input-wrap .toggle-pw{background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:2px;flex-shrink:0;}
    .input-wrap .toggle-pw:hover{color:var(--text-primary);}
    .hint{font-size:0.7rem;color:var(--text-secondary);margin-top:4px;}
    .terms-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:20px;font-size:0.78rem;color:var(--text-secondary);}
    .terms-row input[type=checkbox]{accent-color:var(--gold);width:15px;height:15px;margin-top:2px;flex-shrink:0;}
    .terms-row a{color:var(--gold-light);text-decoration:none;}
    .terms-row a:hover{color:var(--gold);}
    .btn-submit{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:10px;background:linear-gradient(135deg,var(--gold-dim),var(--gold),var(--gold-dim));border:none;color:#0a0a0f;font-family:"Playfair Display","Lora",serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all var(--transition-smooth);letter-spacing:0.03em;}
    .btn-submit:hover{box-shadow:0 0 24px var(--accent-glow);transform:translateY(-1px);filter:brightness(1.1);}
    .btn-submit:active{transform:translateY(0);}
    .auth-footer{text-align:center;margin-top:24px;font-size:0.82rem;color:var(--text-secondary);}
    .auth-footer a{color:var(--gold-light);text-decoration:none;font-weight:600;transition:color var(--transition-smooth);}
    .auth-footer a:hover{color:var(--gold);}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;background:var(--bg-card);border:1px solid var(--border-glow);padding:12px 24px;border-radius:10px;color:var(--gold-light);font-size:0.85rem;opacity:0;pointer-events:none;transition:opacity 0.3s;box-shadow:var(--shadow-gold);}
    .toast.show{opacity:1;}.toast.error{border-color:var(--danger);color:var(--danger);}
    @media(max-width:480px){.auth-card{padding:28px 20px;}}
  </style>
</head>
<body>

<a href="index.html" class="back-home" style="position:fixed;top:20px;left:24px;z-index:2;">
  <iconify-icon icon="heroicons:chevron-left-20-solid" width="16" height="16"></iconify-icon>
  Trang chủ
</a>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <iconify-icon icon="heroicons:user-plus-20-solid" width="36" height="36"></iconify-icon>
      <h2>Đăng ký</h2>
      <p>Tạo tài khoản để bắt đầu hành trình</p>
    </div>

    <form id="registerForm" autocomplete="off">
      <div class="form-group">
        <label>Tên hiển thị</label>
        <div class="input-wrap">
          <iconify-icon icon="heroicons:user-20-solid" width="18" height="18"></iconify-icon>
          <input type="text" id="username" placeholder="nhập tên đạo hữu..." required>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <iconify-icon icon="heroicons:envelope-20-solid" width="18" height="18"></iconify-icon>
          <input type="email" id="email" placeholder="nhập email..." required>
        </div>
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <div class="input-wrap">
          <iconify-icon icon="heroicons:lock-closed-20-solid" width="18" height="18"></iconify-icon>
          <input type="password" id="password" placeholder="ít nhất 6 ký tự..." required>
          <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">
            <iconify-icon icon="heroicons:eye-20-solid" width="18" height="18"></iconify-icon>
          </button>
        </div>
        <div class="hint">Tối thiểu 6 ký tự, bao gồm chữ và số</div>
      </div>

      <div class="form-group">
        <label>Xác nhận mật khẩu</label>
        <div class="input-wrap">
          <iconify-icon icon="heroicons:lock-closed-20-solid" width="18" height="18"></iconify-icon>
          <input type="password" id="confirmPassword" placeholder="nhập lại mật khẩu..." required>
        </div>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="agreeTerms" required>
        <span>Tôi đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a></span>
      </div>

      <button type="submit" class="btn-submit">
        <iconify-icon icon="heroicons:arrow-right-end-on-rectangle-20-solid" width="18" height="18"></iconify-icon>
        Tạo tài khoản
      </button>
    </form>

    <div class="auth-footer">
      Đã có tài khoản? <a href="login.html">Đăng nhập</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="assets/js/auth.js"></script>
<script src="assets/js/register.js"></script>
</body>
</html>
