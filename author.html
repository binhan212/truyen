<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tác giả - Thư Viện Tiên Đạo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <style>
    :root{--bg-deep:#08080f;--bg-panel:#0f0f1a;--bg-card:#151528;--bg-card-hover:#1b1b38;--gold:#c9a050;--gold-light:#e0c87c;--gold-dim:#8a6d3b;--text-primary:#d8d4c8;--text-secondary:#8a8780;--text-title:#e8dcc8;--accent-glow:rgba(201,160,80,0.25);--border-subtle:rgba(201,160,80,0.12);--border-glow:rgba(201,160,80,0.4);--shadow-gold:0 0 20px rgba(201,160,80,0.1);--star-active:#e8b730;--transition-smooth:0.3s cubic-bezier(0.4,0,0.2,1);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg-deep);color:var(--text-primary);font-family:"Lora","Georgia","Times New Roman","Noto Serif",serif;min-height:100vh;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
    body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(201,160,80,0.04) 0%,transparent 55%),radial-gradient(ellipse at 30% 100%,rgba(160,90,40,0.03) 0%,transparent 50%);}
    .container{max-width:1000px;margin:0 auto;padding:0 24px;position:relative;z-index:1;}

    .top-bar{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,var(--bg-deep) 80%,transparent);padding:18px 0 10px;backdrop-filter:blur(12px);}
    .top-inner{display:flex;align-items:center;gap:16px;}
    .back-link{display:flex;align-items:center;gap:4px;text-decoration:none;color:var(--text-secondary);font-size:0.85rem;transition:color var(--transition-smooth);flex-shrink:0;}
    .back-link:hover{color:var(--gold);}
    .page-title{font-family:"Playfair Display","Lora",serif;font-size:1.25rem;font-weight:700;color:var(--gold);text-shadow:0 0 12px var(--accent-glow);}

    .author-hero{display:flex;gap:28px;padding:24px 0 8px;align-items:flex-start;}
    .author-avatar{width:120px;height:120px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:3px solid var(--border-glow);font-family:"Playfair Display",serif;font-size:2.8rem;color:var(--gold-light);text-shadow:0 0 16px var(--accent-glow);position:relative;}
    .author-badge{position:absolute;bottom:-2px;right:-2px;background:var(--gold);color:#0a0a0f;font-size:0.6rem;font-weight:800;padding:2px 8px;border-radius:99px;letter-spacing:0.05em;}
    .author-info{flex:1;min-width:0;padding-top:4px;}
    .author-name{font-family:"Playfair Display",serif;font-size:1.8rem;font-weight:800;color:var(--text-title);text-shadow:0 0 20px var(--accent-glow);}
    .author-bio{font-size:0.9rem;color:var(--text-secondary);line-height:1.7;margin:10px 0 14px;}
    .author-stats{display:flex;gap:24px;flex-wrap:wrap;}
    .author-stat{display:flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text-secondary);}
    .author-stat strong{color:var(--gold-light);font-size:1rem;}
    .author-stat iconify-icon{color:var(--gold-dim);}

    .section-title{font-family:"Playfair Display","Lora",serif;font-size:1.1rem;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:8px;padding:28px 0 16px;margin-top:8px;border-top:1px solid var(--border-subtle);}
    .section-title::before{content:"";width:4px;height:20px;border-radius:2px;background:var(--gold);}

    .work-list{display:flex;flex-direction:column;gap:12px;padding-bottom:60px;}
    .work-card{display:flex;gap:16px;background:var(--bg-panel);border:1px solid var(--border-subtle);border-radius:12px;padding:16px;text-decoration:none;color:inherit;transition:all var(--transition-smooth);cursor:pointer;}
    .work-card:hover{border-color:var(--border-glow);transform:translateX(4px);box-shadow:0 4px 20px rgba(0,0,0,0.3);background:var(--bg-card-hover);}
    .work-cover{width:85px;height:118px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border:1px solid var(--border-subtle);}
    .work-cover::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 40% 30%,rgba(201,160,80,0.12) 0%,transparent 50%);}
    .work-cover .cv{position:relative;z-index:1;font-family:"Playfair Display",serif;font-size:1.5rem;color:var(--gold-light);font-weight:700;}
    .work-badge{position:absolute;top:6px;left:6px;z-index:2;padding:2px 7px;border-radius:99px;font-size:0.6rem;font-weight:700;}
    .work-badge.completed{background:linear-gradient(135deg,#20408b,#0f205c);color:#ccddff;}
    .work-badge.ongoing{background:linear-gradient(135deg,#208b40,#0f5c28);color:#ccffdd;}
    .work-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;}
    .work-title{font-family:"Playfair Display","Lora",serif;font-size:1rem;font-weight:700;color:var(--text-title);}
    .work-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:0.78rem;color:var(--text-secondary);}
    .work-meta .dot{color:var(--gold-dim);}
    .work-rating{display:flex;align-items:center;gap:3px;color:var(--star-active);font-weight:600;}
    .work-rating iconify-icon{width:13px;height:13px;}
    .work-tags{display:flex;gap:5px;flex-wrap:wrap;}
    .work-tags .tag{font-size:0.68rem;padding:2px 9px;border-radius:99px;border:1px solid var(--border-subtle);color:var(--gold-dim);}
    .work-desc{font-size:0.84rem;color:var(--text-secondary);line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

    .footer{text-align:center;padding:30px 0;border-top:1px solid var(--border-subtle);color:var(--text-secondary);font-size:0.8rem;}

    @media(max-width:640px){
      .container{padding:0 14px;}
      .author-hero{flex-direction:column;align-items:center;text-align:center;}
      .author-avatar{width:90px;height:90px;font-size:2rem;}
      .author-name{font-size:1.4rem;}
      .author-stats{justify-content:center;}
      .work-card{padding:12px;gap:10px;}
      .work-cover{width:65px;height:92px;}
      .work-cover .cv{font-size:1.1rem;}
    }
  </style>
  <link rel="stylesheet" href="assets/css/themes.css">
</head>
<body>

<div class="top-bar">
  <div class="container">
    <div class="top-inner">
      <a href="index.html" class="back-link">
        <iconify-icon icon="heroicons:chevron-left-20-solid" width="16" height="16"></iconify-icon>
        Thư viện
      </a>
      <h1 class="page-title">Tác giả</h1>
      <span id="themeBtnSlot"></span>
    </div>
  </div>
</div>

<div class="container">

  <div class="author-hero" id="authorHero"></div>
  <h3 class="section-title">Tác phẩm</h3>
  <div class="work-list" id="workList"></div>

</div>

<footer class="footer">
  &copy; 2024 Thư Viện Tiên Đạo &mdash; Đọc truyện online miễn phí
</footer>

<script src="assets/js/themes.js"></script>
<script src="assets/js/author.js"></script>
<script>ThemeSwitcher.createWidget(document.getElementById("themeBtnSlot"));</script>
</body>
</html>
